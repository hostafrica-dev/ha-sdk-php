name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: composer install --no-dev --optimize-autoloader
      - run: zip -r dist.zip . -x "*.git*"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
